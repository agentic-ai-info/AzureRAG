version: '3.8'
services:
  postgres:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rag_demo
    volumes:
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5432:5432"

  api:
    build: ./api
    ports:
      - "5001:80"
    depends_on:
      - postgres
    environment:
      ConnectionStrings__Default: ${CONNECTIONSTRINGS__DEFAULT}
      AZURE_FOUNDRY_API_KEY: ${AZURE_FOUNDRY_API_KEY}
      AZURE_FOUNDRY_ENDPOINT: ${AZURE_FOUNDRY_ENDPOINT}
      AZURE_FOUNDRY_EMBEDDINGS_ENDPOINT: ${AZURE_FOUNDRY_EMBEDDINGS_ENDPOINT}
